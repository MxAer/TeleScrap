version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telescrap_app
    ports:
      - "6767:6767"
    env_file:
      - .env  
    environment:
      - DB_HOST=db  
    depends_on:
      db:
        condition: service_healthy  
    volumes:
      - ./files:/app/files  
    restart: unless-stopped
    networks:
      - telescrap_net

  db:
    image: postgres:15-alpine
    container_name: telescrap_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata  
    volumes:
      - pgdata:/var/lib/postgresql/data  
    ports:
      - "5432:5432"  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - telescrap_net

volumes:
  pgdata:  

networks:
  telescrap_net:
    driver: bridge