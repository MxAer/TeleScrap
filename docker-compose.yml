version: '3.8'

services:
  # Ваше приложение
  app:
    env_file: .env
    build: .
    container_name: telescrap_app
    ports:
      - "6767:6767"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_NAME=telescrap
      - DB_PORT=5432
      - DB_SSLMODE=disable
      
      - TG_APP_ID=${TG_APP_ID}
      - TG_APP_HASH=${TG_APP_HASH}
      - TG_APP_PHONE=${TG_APP_PHONE}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./files:/app/files
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: telescrap_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=telescrap
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telescrap"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: